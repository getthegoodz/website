<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Goodz - Change Playlist Link</title>
  <style>
    :root {
      --text: #141414;
      --muted: #5f5f5f;
      --line: #e9e9e9;
      --bg: rgb(206, 204, 187);
      --btn: #111;
      --btnText: #fff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "DM Sans", Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; color: var(--text); background: var(--bg); }
    .shell { min-height: 100svh; display: flex; flex-direction: column; }
    .nav { max-width: 1180px; width: 100%; margin: 0 auto; padding: 18px 18px 8px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .logo { height: 28px; width: auto; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: flex-end; }
    .links a { color: #151515; text-decoration: none; font-size: 14px; }
    .links a:hover { text-decoration: underline; }

    .wrap { flex: 1; max-width: 760px; width: 100%; margin: 0 auto; padding: 30px 20px 48px; display: flex; flex-direction: column; justify-content: center; gap: 14px; }
    h1 { margin: 0; text-align: center; font-size: clamp(26px, 5.4vw, 42px); line-height: 1.06; letter-spacing: -0.02em; text-transform: uppercase; }
    p { margin: 0; color: var(--muted); text-align: center; font-size: 16px; line-height: 1.45; }
    .form { display: grid; gap: 10px; }
    label { font-size: 14px; font-weight: 700; }
    input[type="url"] { width: 100%; padding: 14px; border: 1px solid #d7d7d7; border-radius: 10px; font-size: 16px; }
    .row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    .btn { display: inline-block; width: 100%; text-align: center; text-decoration: none; padding: 14px 16px; border-radius: 10px; font-weight: 700; border: 1px solid var(--btn); background: var(--btn); color: var(--btnText); cursor: pointer; }
    .btn.secondary { background: #fff; color: #111; }
    .error { color: #b42318; font-size: 14px; min-height: 20px; text-align: center; }
    .foot { border-top: 1px solid var(--line); padding: 14px 18px 20px; color: #7a7a7a; font-size: 13px; display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; }
    .foot a { color: inherit; }
    @media (max-width: 800px) { .links { display: none; } }
  </style>
</head>
<body>
  <div class="shell">
    <header class="nav">
      <a href="/"><img class="logo" src="https://cdn.prod.website-files.com/654d45c59db76623f5f1a2b8/65568b11f91e8d11ccd581d2_Goodz-logo-Black-5x.png" alt="Goodz"/></a>
      <nav class="links">
        <a href="/about">About</a>
        <a href="/custom">Custom</a>
        <a href="/artist-goodz">Artist</a>
        <a href="/faq">FAQ</a>
        <a href="/support">Support</a>
      </nav>
    </header>

    <main class="wrap">
      <h1>Change Playlist Link</h1>
      <p>Enter your new playlist link below. You can update this any time.</p>

      <form id="editForm" class="form">
        <label for="playlist_url">Playlist link</label>
        <input id="playlist_url" name="playlist_url" type="url" inputmode="url" required placeholder="https://open.spotify.com/..." />
        <input id="code" name="code" type="hidden" />
        <p id="error" class="error"></p>
        <div class="row">
          <a id="cancel" class="btn secondary" href="/tapped">Cancel</a>
          <button id="submit" type="submit" class="btn">Submit</button>
        </div>
      </form>
    </main>

    <footer class="foot">
      <span>© 2025 Goodz. All rights reserved.</span>
      <a href="/privacy-policy">Privacy Policy</a>
      <a href="/terms-of-service">Terms of Service</a>
    </footer>
  </div>

  <script>
    (function () {
      var API_URL = 'https://d9nh35kfsda0s.cloudfront.net/api/tag';
      var params = new URLSearchParams(window.location.search || '');
      var code = params.get('code') || '';
      var playlist = params.get('playlist_url') || '';

      var codeInput = document.getElementById('code');
      var urlInput = document.getElementById('playlist_url');
      var cancel = document.getElementById('cancel');
      var form = document.getElementById('editForm');
      var submit = document.getElementById('submit');
      var error = document.getElementById('error');

      codeInput.value = code;
      if (playlist) urlInput.value = playlist;
      cancel.href = '/tapped?code=' + encodeURIComponent(code) + '&playlist_url=' + encodeURIComponent(playlist);

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        error.textContent = '';

        var nextUrl = (urlInput.value || '').trim();
        if (!/^https?:\/\//i.test(nextUrl)) {
          error.textContent = 'Please enter a valid URL starting with http:// or https://';
          return;
        }
        if (!code) {
          error.textContent = 'Missing card code. Please tap the card again.';
          return;
        }

        submit.disabled = true;
        submit.textContent = 'Saving...';

        var body = new URLSearchParams();
        body.set('code', code);
        body.set('playlist_url', nextUrl);

        fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
          body: body.toString(),
          keepalive: true
        }).catch(function () {
        }).finally(function () {
          window.location.assign('/tapped-confirmation?code=' + encodeURIComponent(code) + '&playlist_url=' + encodeURIComponent(nextUrl));
        });
      });
    })();
  </script>
</body>
</html>
