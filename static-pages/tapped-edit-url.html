<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Goodz - Change Playlist Link</title>
  <style>
    :root {
      --text: #111;
      --muted: #666;
      --line: #e7e7e7;
      --bg: #fff;
      --btn: #111;
      --btnText: #fff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; color: var(--text); background: var(--bg); }
    .wrap { min-height: 100svh; max-width: 760px; margin: 0 auto; padding: 28px 20px 36px; display: flex; flex-direction: column; justify-content: center; gap: 16px; }
    h1 { margin: 0; text-align: center; font-size: clamp(26px, 5.8vw, 40px); line-height: 1.1; letter-spacing: -0.01em; }
    p { margin: 0; color: var(--muted); text-align: center; font-size: 16px; line-height: 1.45; }
    label { font-size: 14px; font-weight: 600; }
    input[type="url"], input[type="text"] { width: 100%; padding: 13px 14px; border: 1px solid #d7d7d7; border-radius: 10px; font-size: 16px; }
    .row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    .btn { display: inline-block; width: 100%; text-align: center; text-decoration: none; padding: 14px 16px; border-radius: 10px; font-weight: 600; border: 1px solid var(--btn); background: var(--btn); color: var(--btnText); cursor: pointer; }
    .btn.secondary { background: #fff; color: #111; border-color: #111; }
    .help { font-size: 13px; color: #8a8a8a; text-align: center; }
    .error { color: #b42318; font-size: 14px; min-height: 20px; text-align: center; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Change Playlist Link</h1>
    <p>Enter your new playlist link below. You can update this any time.</p>

    <form id="editForm">
      <label for="playlist_url">Playlist link</label>
      <input id="playlist_url" name="playlist_url" type="url" inputmode="url" required placeholder="https://open.spotify.com/..." />
      <input id="code" name="code" type="hidden" />
      <p id="error" class="error"></p>
      <div class="row">
        <a id="cancel" class="btn secondary" href="/tapped">Cancel</a>
        <button id="submit" type="submit" class="btn">Submit</button>
      </div>
    </form>

    <p class="help">Tip: Spotify share links and normal https URLs both work.</p>
  </main>

  <script>
    (function () {
      var API_URL = 'https://d9nh35kfsda0s.cloudfront.net/api/tag';

      var params = new URLSearchParams(window.location.search || '');
      var code = params.get('code') || '';
      var playlist = params.get('playlist_url') || '';

      var codeInput = document.getElementById('code');
      var urlInput = document.getElementById('playlist_url');
      var cancel = document.getElementById('cancel');
      var form = document.getElementById('editForm');
      var submit = document.getElementById('submit');
      var error = document.getElementById('error');

      codeInput.value = code;
      if (playlist) urlInput.value = playlist;
      cancel.href = '/tapped?code=' + encodeURIComponent(code) + '&playlist_url=' + encodeURIComponent(playlist);

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        error.textContent = '';

        var nextUrl = (urlInput.value || '').trim();
        if (!/^https?:\/\//i.test(nextUrl)) {
          error.textContent = 'Please enter a valid URL starting with http:// or https://';
          return;
        }
        if (!code) {
          error.textContent = 'Missing card code. Please tap the card again.';
          return;
        }

        submit.disabled = true;
        submit.textContent = 'Saving...';

        var body = new URLSearchParams();
        body.set('code', code);
        body.set('playlist_url', nextUrl);

        fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
          body: body.toString(),
          keepalive: true
        }).catch(function () {
          // Ignore fetch errors here, still continue to confirmation page.
        }).finally(function () {
          window.location.assign('/tapped-confirmation?code=' + encodeURIComponent(code) + '&playlist_url=' + encodeURIComponent(nextUrl));
        });
      });
    })();
  </script>
</body>
</html>
