<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Goodz - Change your link</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{ --amber:#E8A820; --amber-bright:#FEC850; --ink:#0a0a0a; --white:#fff; --black:#111; --border:2px solid #111; }
    html,body{min-height:100%}
    body{font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#fff;display:flex;flex-direction:column;min-height:100vh}

    .topbar{display:flex;justify-content:center;padding:1.5rem 1rem .5rem}
    .topbar img{height:22px;width:auto;display:block}

    main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2.5rem 1.5rem 4rem}
    .card{width:100%;max-width:440px}
    h1{font-family:'Poppins',sans-serif;font-weight:800;font-size:clamp(1.5rem,6vw,2rem);line-height:1.15;margin-bottom:.6rem}
    .lede{color:rgba(255,255,255,.6);line-height:1.6;margin-bottom:2rem;font-size:.95rem}

    form{display:flex;flex-direction:column;gap:.85rem;text-align:left}
    label{font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.55)}
    input[type=url]{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);border-radius:10px;
      padding:.85rem .95rem;color:#fff;font:inherit;font-size:1rem;outline:none;transition:border-color .15s,background .15s}
    input[type=url]::placeholder{color:rgba(255,255,255,.35)}
    input[type=url]:focus{border-color:var(--amber-bright);background:rgba(254,200,80,.08)}
    .error{color:#ff6b6b;font-weight:600;font-size:.88rem;min-height:18px;text-align:center;margin:0}

    .row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.4rem}
    .btn{display:inline-flex;align-items:center;justify-content:center;font:inherit;font-weight:700;font-size:.95rem;
      border-radius:999px;padding:.85rem 1.5rem;cursor:pointer;text-decoration:none;border:1px solid transparent;transition:filter .15s,background .15s,border-color .15s}
    .btn.amber{background:var(--amber-bright);color:var(--ink)}
    .btn.amber:hover{filter:brightness(1.06)}
    .btn.amber:disabled{opacity:.6;cursor:default}
    .btn.outline{background:transparent;color:#fff;border-color:rgba(255,255,255,.28)}
    .btn.outline:hover{border-color:#fff}
    @media (max-width:420px){.row{grid-template-columns:1fr}}

    /* Goodz site footer (matches getthegoodz.com) */
    footer{position:relative;z-index:10;background:var(--black);color:var(--white);padding:3.5rem 2rem;display:grid;grid-template-columns:1fr 2fr 1fr;gap:3rem;border-top:var(--border);text-align:left}
    .footer-logo{margin-bottom:.5rem}
    .footer-logo img{height:24px;width:auto;display:block}
    .footer-tagline{font-size:.78rem;color:#b0b0b0}
    .footer-links{display:grid;grid-template-columns:1fr 1fr;gap:.5rem 2rem;align-items:start}
    .footer-col{list-style:none;display:flex;flex-direction:column;gap:.5rem}
    .footer-links a{font-size:.78rem;color:#d0d0d0;text-decoration:none;transition:color .15s}
    .footer-links a:hover{color:var(--white)}
    .footer-right{text-align:right}
    .footer-social{display:flex;gap:1rem;justify-content:flex-end;margin-bottom:1rem}
    .footer-social a{display:inline-flex;align-items:center;justify-content:center;color:#d0d0d0;transition:color .15s}
    .footer-social a:hover{color:var(--amber)}
    .footer-social a svg{display:block}
    .footer-copy{font-size:.68rem;color:#909090}
    @media(max-width:640px){footer{grid-template-columns:1fr;gap:2rem}.footer-right{text-align:left}.footer-social{justify-content:flex-start}}
  </style>
</head>
<body>

  <div class="topbar"><img src="/logos/goodz-wordmark-white.svg" alt="Goodz"></div>

  <main>
    <div class="card">
      <h1>Change your link</h1>
      <p class="lede">Paste a new music or web link below and this Goodz will point to it. You can update it any time.</p>

      <form id="editForm">
        <label for="playlist_url">New link</label>
        <input id="playlist_url" name="playlist_url" type="url" inputmode="url" required
          placeholder="https://  a Spotify, Apple, YouTube, Bandcamp, or any URL" />
        <input id="code" name="code" type="hidden" />
        <p id="error" class="error"></p>
        <div class="row">
          <a id="cancel" class="btn outline" href="#">Cancel</a>
          <button id="submit" type="submit" class="btn amber">Save link</button>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <div>
      <div class="footer-logo"><img src="/logos/goodz-wordmark-white.svg" alt="Goodz" width="152" height="24"></div>
      <div class="footer-tagline">Music you can hold</div>
    </div>
    <div class="footer-links">
      <ul class="footer-col">
        <li><a href="/mixtape">Mixtape Goodz</a></li>
        <li><a href="/custom">Custom Goodz</a></li>
        <li><a href="/about">About</a></li>
      </ul>
      <ul class="footer-col">
        <li><a href="/contact">Contact</a></li>
        <li><a href="/support">Support</a></li>
        <li><a href="/terms-of-service">Terms of Service</a></li>
        <li><a href="/privacy-policy">Privacy Policy</a></li>
      </ul>
    </div>
    <div class="footer-right">
      <div class="footer-social">
        <a href="https://www.instagram.com/getthegoodz" aria-label="Instagram">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.9" fill="currentColor" stroke="none"/></svg>
        </a>
        <a href="https://www.facebook.com/getthegoodz" aria-label="Facebook">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M13.5 21v-7.5h2.5l.4-3h-2.9V8.6c0-.9.25-1.5 1.55-1.5h1.65V4.4c-.3-.04-1.3-.12-2.45-.12-2.4 0-4.05 1.46-4.05 4.15v2.07H7.7v3h2.5V21h3.3z"/></svg>
        </a>
      </div>
      <div class="footer-copy">© 2026 Goodz. All rights reserved.</div>
    </div>
  </footer>

  <script>
    // Functional core preserved from the production /tapped-edit-url page.
    // Only the redirect/cancel targets point at the prototype pages.
    (function () {
      var API_URL = 'https://d9nh35kfsda0s.cloudfront.net/api/tag';
      var params = new URLSearchParams(window.location.search || '');
      var code = params.get('code') || '';
      var playlist = params.get('playlist_url') || '';

      var codeInput = document.getElementById('code');
      var urlInput = document.getElementById('playlist_url');
      var cancel = document.getElementById('cancel');
      var form = document.getElementById('editForm');
      var submit = document.getElementById('submit');
      var error = document.getElementById('error');

      codeInput.value = code;
      if (playlist) urlInput.value = playlist;
      cancel.href = '/tapped?code=' + encodeURIComponent(code) + '&playlist_url=' + encodeURIComponent(playlist);

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        error.textContent = '';

        var nextUrl = (urlInput.value || '').trim();
        if (!/^https?:\/\//i.test(nextUrl)) {
          error.textContent = 'Please enter a valid URL starting with http:// or https://';
          return;
        }
        if (!code) {
          error.textContent = 'Missing card code. Please tap the card again.';
          return;
        }

        submit.disabled = true;
        submit.textContent = 'Saving...';

        var body = new URLSearchParams();
        body.set('code', code);
        body.set('playlist_url', nextUrl);

        fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
          body: body.toString(),
          keepalive: true
        }).catch(function () {
        }).finally(function () {
          window.location.assign('/tapped-confirmation?code=' + encodeURIComponent(code) + '&playlist_url=' + encodeURIComponent(nextUrl));
        });
      });
    })();
  </script>
</body>
</html>
