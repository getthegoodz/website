<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>You Tapped a Goodz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Exo:wght@700;900&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23FEC850'/><text x='50' y='72' font-size='65' font-family='Arial Black' font-weight='900' fill='%23191414' text-anchor='middle'>G</text></svg>">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{ --accent:#FEC850; --ink:#0a0a0a; --amber:#E8A820; --white:#fff; --black:#111; --border:2px solid #111; }
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#fff;overflow-x:hidden}
    body{min-height:100%}

    /* blurred art backdrop (tier 1) */
    #bg{position:fixed;inset:0;background-size:cover;background-position:center;transform:scale(1.1);filter:blur(28px) brightness(.45);opacity:0;transition:opacity .8s ease}
    #bg.on{opacity:1}
    #overlay{position:fixed;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15),rgba(0,0,0,.55) 45%,rgba(0,0,0,.9));pointer-events:none}

    #wordmark{position:fixed;top:1.25rem;left:50%;transform:translateX(-50%);z-index:20;opacity:0;transition:opacity .5s}
    #wordmark.on{opacity:.95}
    #wordmark img{height:22px;width:auto;display:block;filter:drop-shadow(0 1px 6px rgba(0,0,0,.5))}

    #wrap{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:5rem 1.5rem 3rem;gap:1.25rem}

    #art{width:min(240px,64vw);aspect-ratio:1;border-radius:14px;background-size:cover;background-position:center;background-color:#1a1a1a;box-shadow:0 18px 60px rgba(0,0,0,.6);opacity:0;transform:scale(.85);transition:opacity .7s ease,transform .7s cubic-bezier(.22,1,.36,1)}
    #art.on{opacity:1;transform:scale(1)}
    #art.round{border-radius:50%}

    #titles{opacity:0;transform:translateY(12px);transition:opacity .6s ease .15s,transform .6s ease .15s;max-width:380px}
    #titles.on{opacity:1;transform:none}
    #title{font-family:'Poppins',sans-serif;font-weight:800;font-size:clamp(1.3rem,5vw,1.9rem);line-height:1.18;text-shadow:0 2px 18px rgba(0,0,0,.6)}
    #artist{margin-top:.35rem;color:rgba(255,255,255,.72);font-size:1rem}
    #eyebrow{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:.5rem;font-weight:700}

    #embed{width:100%;max-width:480px;opacity:0;transition:opacity .6s ease .3s}
    #embed.on{opacity:1}
    #embed iframe{width:100%;border:0;border-radius:12px;display:block}

    #cta{display:inline-flex;align-items:center;gap:.55rem;background:var(--accent);color:var(--ink);font-weight:700;font-size:1rem;padding:.9rem 2rem;border-radius:999px;text-decoration:none;box-shadow:0 6px 24px rgba(0,0,0,.35);opacity:0;transform:translateY(10px);transition:opacity .6s ease .35s,transform .6s ease .35s,filter .15s}
    #cta.on{opacity:1;transform:none}
    #cta:hover{filter:brightness(1.06)}

    #change{margin-top:.25rem;font-size:.78rem;color:rgba(255,255,255,.5);text-decoration:underline;text-underline-offset:3px;opacity:0;transition:opacity .6s ease .5s}
    #change.on{opacity:1}
    #change:hover{color:#fff}

    #loading{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:#0a0a0a;transition:opacity .4s}
    #loading.hidden{opacity:0;pointer-events:none}
    .spin{width:46px;height:46px;border:3px solid rgba(255,255,255,.12);border-top-color:var(--accent);border-radius:50%;animation:sp .9s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}

    /* Goodz site footer (matches getthegoodz.com) */
    footer{position:relative;z-index:10;background:var(--black);color:var(--white);padding:3.5rem 2rem;display:grid;grid-template-columns:1fr 2fr 1fr;gap:3rem;border-top:var(--border);text-align:left}
    .footer-logo{margin-bottom:.5rem}
    .footer-logo img{height:24px;width:auto;display:block}
    .footer-tagline{font-size:.78rem;color:#b0b0b0}
    .footer-links{display:grid;grid-template-columns:1fr 1fr;gap:.5rem 2rem;align-items:start}
    .footer-col{list-style:none;display:flex;flex-direction:column;gap:.5rem}
    .footer-links a{font-size:.78rem;color:#d0d0d0;text-decoration:none;transition:color .15s}
    .footer-links a:hover{color:var(--white)}
    .footer-right{text-align:right}
    .footer-social{display:flex;gap:1rem;justify-content:flex-end;margin-bottom:1rem}
    .footer-social a{display:inline-flex;align-items:center;justify-content:center;color:#d0d0d0;transition:color .15s}
    .footer-social a:hover{color:var(--amber)}
    .footer-social a svg{display:block}
    .footer-copy{font-size:.68rem;color:#909090}
    @media(max-width:640px){footer{grid-template-columns:1fr;gap:2rem}.footer-right{text-align:left}.footer-social{justify-content:flex-start}}
  </style>
</head>
<body>
  <div id="loading"><div class="spin"></div></div>
  <div id="bg"></div>
  <div id="overlay"></div>
  <div id="wordmark"><img src="/logos/goodz-wordmark-white.svg" alt="Goodz"></div>

  <main id="wrap">
    <div id="art"></div>
    <div id="titles">
      <div id="eyebrow">You tapped in</div>
      <div id="title">Loading…</div>
      <div id="artist"></div>
    </div>
    <div id="embed"></div>
    <a id="cta" href="#" target="_blank" rel="noopener">Listen</a>
    <a id="change" href="/tapped-edit-url">Change the link on this Goodz</a>
  </main>

  <footer>
    <div>
      <div class="footer-logo"><img src="/logos/goodz-wordmark-white.svg" alt="Goodz" width="152" height="24"></div>
      <div class="footer-tagline">Music you can hold</div>
    </div>
    <div class="footer-links">
      <ul class="footer-col">
        <li><a href="/mixtape">Mixtape Goodz</a></li>
        <li><a href="/custom">Custom Goodz</a></li>
        <li><a href="/about">About</a></li>
      </ul>
      <ul class="footer-col">
        <li><a href="/contact">Contact</a></li>
        <li><a href="/support">Support</a></li>
        <li><a href="/terms-of-service">Terms of Service</a></li>
        <li><a href="/privacy-policy">Privacy Policy</a></li>
      </ul>
    </div>
    <div class="footer-right">
      <div class="footer-social">
        <a href="https://www.instagram.com/getthegoodz" aria-label="Instagram">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.9" fill="currentColor" stroke="none"/></svg>
        </a>
        <a href="https://www.facebook.com/getthegoodz" aria-label="Facebook">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M13.5 21v-7.5h2.5l.4-3h-2.9V8.6c0-.9.25-1.5 1.55-1.5h1.65V4.4c-.3-.04-1.3-.12-2.45-.12-2.4 0-4.05 1.46-4.05 4.15v2.07H7.7v3h2.5V21h3.3z"/></svg>
        </a>
      </div>
      <div class="footer-copy">© 2026 Goodz. All rights reserved.</div>
    </div>
  </footer>

  <script>
    function getParam(n){
      var m = new RegExp('[?&]'+n+'=([^&#]*)').exec(location.search);
      return m ? decodeURIComponent(m[1].replace(/\+/g,' ')) : '';
    }
    var targetUrl = getParam('playlist_url') || getParam('url');
    var code = getParam('code');

    var $ = function(id){ return document.getElementById(id); };
    var loading=$('loading'), bg=$('bg'), wordmark=$('wordmark'), art=$('art'),
        titles=$('titles'), title=$('title'), artist=$('artist'), eyebrow=$('eyebrow'),
        embed=$('embed'), cta=$('cta'), change=$('change');

    // per-provider embed height (px) or aspect ratio
    var EMBED = {
      spotify:{h:352}, apple:{h:450}, youtube:{ratio:'16/9'},
      soundcloud:{h:166}, deezer:{h:300}, tidal:{h:120}
    };

    if (code || targetUrl) {
      change.href = '/tapped-edit-url?code=' + encodeURIComponent(code) +
        '&playlist_url=' + encodeURIComponent(targetUrl);
    }

    function reveal(d){
      loading.classList.add('hidden');
      document.documentElement.style.setProperty('--accent', d.accent || '#FEC850');
      cta.href = d.openUrl || targetUrl || '#';

      if (d.artworkUrl){
        bg.style.backgroundImage = 'url("'+d.artworkUrl+'")';
        art.style.backgroundImage = 'url("'+d.artworkUrl+'")';
      }
      title.textContent = d.title || titleFallback(d);
      artist.textContent = d.artist || '';
      artist.style.display = d.artist ? 'block' : 'none';

      // tier-specific layout
      if (d.tier === 1 && d.embedUrl){
        art.classList.add('round');
        var cfg = EMBED[d.provider] || {};
        var style = d.embedHeight ? 'height:'+d.embedHeight+'px'
          : cfg.ratio ? 'aspect-ratio:'+cfg.ratio
          : 'height:'+(cfg.h||352)+'px';
        embed.innerHTML = '<iframe src="'+d.embedUrl+'" style="'+style+'" ' +
          'allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" ' +
          'loading="lazy"></iframe>';
        cta.textContent = d.provider === 'generic' ? 'Open the link' : 'Open in ' + d.providerName;
        showEmbed();
      } else if (d.tier === 2){
        // art + open button, no inline player
        cta.textContent = d.provider === 'generic' ? 'Open the link' : 'Open in ' + d.providerName;
        if (!d.artworkUrl) art.style.display = 'none';
      } else {
        // tier 3 default: branded, never a dead end
        art.classList.remove('round');
        if (!d.artworkUrl) art.style.display = 'none';
        if (!d.title) title.textContent = 'Your music is one tap away';
        cta.textContent = 'Open the link';
      }
      runIn();
    }

    function titleFallback(d){
      return d.provider && d.provider !== 'generic'
        ? 'Saved on ' + d.providerName : 'Your Goodz';
    }

    function showEmbed(){ /* gated by runIn timing */ }

    function runIn(){
      setTimeout(function(){ wordmark.classList.add('on'); }, 60);
      setTimeout(function(){ bg.classList.add('on'); }, 120);
      setTimeout(function(){ art.classList.add('on'); }, 200);
      setTimeout(function(){ titles.classList.add('on'); }, 420);
      setTimeout(function(){ cta.classList.add('on'); change.classList.add('on'); }, 640);
      setTimeout(function(){ embed.classList.add('on'); }, 760);
    }

    function fallback(){
      reveal({ provider:'generic', providerName:'the link', accent:'#FEC850',
        tier:3, openUrl: targetUrl });
    }

    if (!targetUrl){
      reveal({ provider:'generic', providerName:'the link', accent:'#FEC850',
        tier:3, title:'No link on this Goodz yet', openUrl:'#' });
      cta.style.display = 'none';
    } else {
      var ctrl = new AbortController();
      var to = setTimeout(function(){ ctrl.abort(); }, 9000);
      fetch('/api/resolve-tap?url=' + encodeURIComponent(targetUrl), { signal: ctrl.signal })
        .then(function(r){ if(!r.ok) throw new Error('bad'); return r.json(); })
        .then(function(d){ clearTimeout(to); reveal(d); })
        .catch(function(){ clearTimeout(to); fallback(); });
    }
  </script>
</body>
</html>
