<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>You Tapped a Goodz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --spotify-green: #1DB954;
      --spotify-black: #191414;
      --text-light: #ffffff;
      --text-muted: rgba(255,255,255,0.7);
      --overlay-gradient: linear-gradient(
        to bottom,
        rgba(0,0,0,0.1) 0%,
        rgba(0,0,0,0.3) 40%,
        rgba(0,0,0,0.85) 100%
      );
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', 'Poppins', 'Helvetica Neue', sans-serif;
      background: #0a0a0a;
      color: var(--text-light);
      overflow: hidden;
    }

    /* ── Background layer ─────────────────────────────── */
    #bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1.08);
      filter: blur(24px) brightness(0.5);
      opacity: 0;
      transition: none;
      will-change: transform, filter, opacity;
    }

    #bg.revealed {
      animation: artReveal 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes artReveal {
      0%   { transform: scale(1.12); filter: blur(24px) brightness(0.4); opacity: 0; }
      100% { transform: scale(1.0);  filter: blur(0px)  brightness(1.0);  opacity: 1; }
    }

    /* ── Gradient overlay ─────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay-gradient);
      pointer-events: none;
    }

    /* ── Main content ────────────────────────────────── */
    #content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
      pointer-events: none;
    }

    /* ── Goodz wordmark ───────────────────────────────── */
    #wordmark {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #wordmark.visible { opacity: 1; }

    .wordmark-text {
      font-family: 'Exo', 'Poppins', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      color: var(--text-light);
      text-transform: uppercase;
    }

    /* ── Artwork (circular, centered during reveal) ───── */
    #artwork {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      box-shadow: 0 0 80px rgba(0,0,0,0.7);
      opacity: 0;
      transform: scale(0.6);
      transition: none;
      margin-bottom: 2rem;
    }

    #artwork.revealed {
      animation: artworkReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    @keyframes artworkReveal {
      0%   { opacity: 0; transform: scale(0.5); }
      60%  { opacity: 1; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1.0); }
    }

    /* ── Playlist title ───────────────────────────────── */
    #title-group {
      opacity: 0;
      transform: translateY(16px);
      transition: none;
      margin-bottom: 2rem;
      max-width: 360px;
    }
    #title-group.revealed {
      animation: fadeUp 0.8s ease 1.0s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    #playlist-title {
      font-family: 'Exo', 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(1.4rem, 5vw, 2rem);
      line-height: 1.2;
      color: var(--text-light);
      margin-bottom: 0.4rem;
      text-shadow: 0 2px 16px rgba(0,0,0,0.6);
    }

    #playlist-description {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 400;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Buttons ──────────────────────────────────────── */
    #actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: all;
    }
    #actions.revealed {
      animation: fadeUp 0.7s ease 1.4s forwards;
    }

    .btn-spotify {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--spotify-green);
      color: var(--spotify-black);
      font-weight: 700;
      font-size: 1rem;
      padding: 0.85rem 2rem;
      border-radius: 999px;
      text-decoration: none;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 24px rgba(29,185,84,0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .btn-spotify:hover {
      transform: scale(1.04);
      box-shadow: 0 6px 32px rgba(29,185,84,0.5);
      background: #1ed760;
    }
    .btn-spotify:active { transform: scale(0.97); }

    .spotify-icon {
      width: 22px;
      height: 22px;
      fill: var(--spotify-black);
    }

    .btn-change {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0.25rem;
      transition: color 0.15s;
    }
    .btn-change:hover { color: var(--text-light); }

    /* ── Loading state ───────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      transition: opacity 0.5s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--spotify-green);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error state ─────────────────────────────────── */
    #error {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      padding: 2rem;
      text-align: center;
      gap: 1rem;
    }
    #error.visible { display: flex; }
    #error p { color: var(--text-muted); font-size: 0.9rem; }
    #error a { color: var(--spotify-green); }

    /* ── Spotify iframe embed ─────────────────────────── */
    #embed-container {
      width: 100%;
      max-width: 500px;
      opacity: 0;
      pointer-events: none;
    }
    #embed-container.revealed {
      animation: fadeUp 0.7s ease 1.8s forwards;
    }
    #embed-container iframe {
      border-radius: 12px;
      border: none;
      width: 100%;
      height: 152px;
    }

    /* ── Edit link ───────────────────────────────────── */
    #edit-link {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      z-index: 20;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    #edit-link:hover { color: rgba(255,255,255,0.7); }
  </style>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Exo:wght@700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Favicon (inline Goodz G) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231DB954'/><text x='50' y='72' font-size='65' font-family='Arial Black' font-weight='900' fill='%23191414' text-anchor='middle'>G</text></svg>">
</head>
<body>

  <!-- Loading -->
  <div id="loading"><div class="loader"></div></div>

  <!-- Error fallback -->
  <div id="error">
    <p>Couldn't load this playlist.</p>
    <p><a href="#" id="error-fallback-link">Open in Spotify →</a></p>
  </div>

  <!-- Background image (Spotify cover art) -->
  <div id="bg"></div>
  <div id="overlay"></div>

  <!-- Wordmark -->
  <div id="wordmark">
    <span class="wordmark-text">Goodz</span>
  </div>

  <!-- Main content -->
  <div id="content">

    <!-- Artwork circle (inside flex column, centered) -->
    <div id="artwork"></div>

    <div id="title-group">
      <div id="playlist-title">Loading…</div>
      <div id="playlist-description"></div>
    </div>

    <div id="actions">
      <a id="btn-listen" class="btn-spotify" href="#" target="_blank" rel="noopener">
        <!-- Spotify icon -->
        <svg class="spotify-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        Listen Now
      </a>
      <div id="embed-container">
        <div id="spotify-embed"></div>
      </div>
      <button class="btn-change" id="btn-change">Change playlist</button>
    </div>

  </div>

  <!-- Edit URL link -->
  <a id="edit-link" href="/tapped-edit-url">Change playlist →</a>

  <script>
    // ── Helpers ────────────────────────────────────────
    function getParam(name) {
      name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
      var re = new RegExp('[\\?&]' + name + '=([^&#]*)');
      var r = re.exec(location.search);
      return r ? decodeURIComponent(r[1].replace(/\+/g, ' ')) : '';
    }

    // Spotify playlist URL → ID (handles open.spotify.com/playlist/{id})
    function extractPlaylistId(url) {
      var m = url.match(/open\.spotify\.com\/playlist\/([a-zA-Z0-9]+)/);
      return m ? m[1] : null;
    }

    // ── State ──────────────────────────────────────────
    var playlistUrl = getParam('playlist_url') || '';
    var code       = getParam('code') || '';
    var playlistId = extractPlaylistId(playlistUrl);

    var btnListen    = document.getElementById('btn-listen');
    var btnChange    = document.getElementById('btn-change');
    var bg           = document.getElementById('bg');
    var artwork      = document.getElementById('artwork');
    var titleGroup   = document.getElementById('title-group');
    var actions      = document.getElementById('actions');
    var wordmark     = document.getElementById('wordmark');
    var loading      = document.getElementById('loading');
    var errorEl      = document.getElementById('error');
    var errorFallback= document.getElementById('error-fallback-link');
    var editLink     = document.getElementById('edit-link');
    var titleEl      = document.getElementById('playlist-title');
    var descEl       = document.getElementById('playlist-description');
    var spotifyEmbed = document.getElementById('spotify-embed');
    var embedContainer = document.getElementById('embed-container');

    // Fallback: open Spotify directly
    btnListen.href = playlistUrl || 'https://open.spotify.com';
    if (errorFallback) errorFallback.href = playlistUrl || 'https://open.spotify.com';

    // Edit link
    if (code || playlistUrl) {
      editLink.href = '/tapped-edit-url' + (code || playlistUrl ? '?code=' + encodeURIComponent(code) + '&playlist_url=' + encodeURIComponent(playlistUrl) : '');
    }

    // Change button
    btnChange.addEventListener('click', function() {
      location.href = editLink.href;
    });

    // ── No URL provided ────────────────────────────────
    if (!playlistId) {
      loading.classList.add('hidden');
      titleEl.textContent = 'No playlist linked';
      descEl.textContent = 'Tap a Goodz to get started.';
      bg.style.background = '#1a1a1a';
      bg.style.opacity = '1';
      bg.classList.add('revealed');
      wordmark.classList.add('visible');
      actions.classList.add('revealed');
    } else {
      // ── Fetch Spotify oEmbed ───────────────────────────
      // oEmbed endpoint is CORS-friendly, no auth needed
      var oembedUrl = 'https://open.spotify.com/oembed?url=' + encodeURIComponent(playlistUrl);

      // Abort after 8 seconds — don't leave user hanging
      var controller = new AbortController();
      var timeoutId = setTimeout(function() { controller.abort(); }, 8000);

      fetch(oembedUrl, { signal: controller.signal })
        .then(function(r) {
          if (!r.ok) throw new Error('oEmbed fetch failed');
          return r.json();
        })
        .then(function(data) {
        // Hide loading
        loading.classList.add('hidden');

        // Cover image — prefer oEmbed thumbnail, fall back to Spotify og:image
        var thumbnailUrl = data.thumbnail_url || '';
        var embedHtml    = data.html || '';
        var title        = data.title || 'Your Goodz Playlist';
        var provider      = data.provider_name || '';

        // Set background
        if (thumbnailUrl) {
          bg.style.backgroundImage = 'url(' + thumbnailUrl + ')';
          artwork.style.backgroundImage = 'url(' + thumbnailUrl + ')';
        } else {
          // Fallback gradient
          bg.style.background = 'linear-gradient(135deg, #1DB954, #191414)';
          bg.style.opacity = '0.6';
        }

        // Set title
        titleEl.textContent = title;
        if (provider === 'Spotify') {
          descEl.textContent = 'Tap to listen on Spotify';
        }

        // Extract playlist ID from embed html to build safe embed URL
        var embedMatch = embedHtml.match(/src="([^"]*spotify\.com[^\"]*)"/);
        if (embedMatch) {
          // Use the embed URL with hide_cover=1 to avoid duplicate artwork
          var rawEmbed = embedMatch[1];
          var safeEmbed = rawEmbed.replace(/\[params\]/, '?utm_source=generator&hide_cover=1');
          spotifyEmbed.innerHTML = '<iframe src="' + safeEmbed + '" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>';
        }

        // Trigger animations in sequence
        setTimeout(function() { wordmark.classList.add('visible'); }, 100);
        setTimeout(function() { bg.classList.add('revealed'); }, 200);
        setTimeout(function() { artwork.classList.add('revealed'); }, 300);
        setTimeout(function() { titleGroup.classList.add('revealed'); }, 800);
        setTimeout(function() { actions.classList.add('revealed'); }, 1100);
        setTimeout(function() { embedContainer.classList.add('revealed'); }, 1400);

      })
      .catch(function(err) {
        console.warn('oEmbed error:', err);
        // Graceful degradation: show page without rich data
        loading.classList.add('hidden');
        bg.style.background = '#1a1a1a';
        bg.style.opacity = '1';
        bg.classList.add('revealed');
        wordmark.classList.add('visible');
        titleEl.textContent = 'Your Goodz Playlist';
        descEl.textContent = 'Open in Spotify to listen.';
        actions.classList.add('revealed');
      });
    }
  </script>
</body>
</html>
