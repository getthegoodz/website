<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Goodz Link Updated</title>
  <style>
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif; background:#0f1424; color:#eef2ff; margin:0; }
    .wrap { max-width:780px; margin:0 auto; padding:32px 20px; }
    .card { background:#171f36; border:1px solid #2d3a66; border-radius:14px; padding:24px; }
    h1 { margin:0 0 14px; font-size:28px; }
    p { color:#c8d3ff; line-height:1.5; }
    .row { margin:12px 0; }
    a.btn { display:inline-block; margin-top:10px; background:#4f7cff; color:white; text-decoration:none; padding:10px 14px; border-radius:10px; font-weight:600; }
    code { background:#0c1222; padding:2px 6px; border-radius:6px; color:#b7c7ff; }
    .muted { color:#9eb0e8; font-size:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Your Goodz playlist link has been updated</h1>
      <p id="status">We stored your update successfully.</p>
      <div class="row muted">Card code: <code id="code">(unknown)</code></div>
      <div class="row" id="playlistRow" style="display:none;">
        <a id="openLink" class="btn" target="_blank" rel="noopener">Open playlist link</a>
      </div>
      <div class="row" id="editRow" style="display:none;">
        <a id="editLink" class="btn">Change playlist link</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      function readParam(name) {
        try {
          const raw = new URL(window.location.href).searchParams.get(name) || '';
          try { return decodeURIComponent(raw); } catch (_) { return raw; }
        } catch (_) {
          return '';
        }
      }

      const code = readParam('code');
      const playlist = readParam('playlist_url');

      document.getElementById('code').textContent = code || '(unknown)';

      if (playlist) {
        const open = document.getElementById('openLink');
        open.href = playlist;
        document.getElementById('playlistRow').style.display = 'block';
      } else {
        document.getElementById('status').textContent = 'Update received. Playlist URL was not included in this response.';
      }

      if (code) {
        const edit = document.getElementById('editLink');
        const qp = new URLSearchParams();
        qp.set('code', code);
        if (playlist) qp.set('playlist_url', playlist);
        edit.href = '/tapped-edit-url?' + qp.toString();
        document.getElementById('editRow').style.display = 'block';
      }
    })();
  </script>
</body>
</html>
