<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Goodz - Link Updated</title>
  <style>
    :root {
      --text: #111;
      --muted: #666;
      --line: #e7e7e7;
      --bg: #fff;
      --btn: #111;
      --btnText: #fff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .wrap {
      min-height: 100svh;
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 20px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }
    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 4px;
      object-fit: contain;
    }
    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(26px, 5.8vw, 40px);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0;
      color: var(--muted);
      text-align: center;
      font-size: 16px;
      line-height: 1.45;
    }
    .btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      padding: 14px 16px;
      border-radius: 10px;
      font-weight: 600;
      border: 1px solid var(--btn);
      background: var(--btn);
      color: var(--btnText);
    }
    .btn.secondary {
      background: #fff;
      color: #111;
      border-color: #111;
    }
    .hr { height: 1px; background: var(--line); margin: 4px 0; }
    .small { font-size: 13px; color: #8a8a8a; }
    .small a { color: inherit; }
  </style>
</head>
<body>
  <main class="wrap">
    <img
      class="logo"
      src="https://cdn.prod.website-files.com/654d45c59db76623f5f1a2b8/65820333e2ddb47d9763a62e_squarelogo_black_500px.png"
      alt="Goodz"
      loading="eager"
      decoding="async"
    />

    <h1>YOUR GOODZ PLAYLIST LINK HAS BEEN SUCCESSFULLY UPDATED</h1>
    <p id="summary">Update this link if you want to change the playlist that this Goodz links to.</p>

    <a id="playlist_link" class="btn" href="#" target="_blank" rel="noopener">Open playlist link</a>
    <div class="hr"></div>
    <a id="change_playlist" class="btn secondary" href="/tapped-edit-url">Change playlist link</a>

    <p class="small"><a href="/">Back to getthegoodz.com</a></p>
  </main>

  <script>
    (function () {
      var params;
      try {
        params = new URL(window.location.href).searchParams;
      } catch (_) {
        params = new URLSearchParams(window.location.search || '');
      }

      var code = params.get('code') || '';
      var playlist = params.get('playlist_url') || '';

      var playlistLink = document.getElementById('playlist_link');
      var changeLink = document.getElementById('change_playlist');
      var summary = document.getElementById('summary');

      if (!playlist) {
        playlistLink.textContent = 'No playlist URL found';
        playlistLink.removeAttribute('href');
        playlistLink.style.opacity = '0.6';
        playlistLink.style.pointerEvents = 'none';
      } else {
        playlistLink.href = playlist;
      }

      var qp = new URLSearchParams();
      if (code) qp.set('code', code);
      if (playlist) qp.set('playlist_url', playlist);
      changeLink.href = '/tapped-edit-url' + (qp.toString() ? ('?' + qp.toString()) : '');

      if (code) {
        summary.textContent = 'Card code ' + code + ' updated. You can change this link again any time.';
      }
    })();
  </script>
</body>
</html>
