<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Goodz - Link Updated</title>
  <style>
    :root {
      --text: #141414;
      --muted: #5f5f5f;
      --line: #e9e9e9;
      --bg: rgb(206, 204, 187);
      --btn: #111;
      --btnText: #fff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "DM Sans", Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .shell { min-height: 100svh; display: flex; flex-direction: column; }
    .nav {
      max-width: 1180px; width: 100%; margin: 0 auto; padding: 18px 18px 8px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .logo { height: 28px; width: auto; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: flex-end; }
    .links a { color: #151515; text-decoration: none; font-size: 14px; }
    .links a:hover { text-decoration: underline; }

    .wrap {
      flex: 1;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 30px 20px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }
    .badge {
      width: 100px; height: 100px; margin: 0 auto 6px; object-fit: contain;
    }
    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(26px, 5.4vw, 42px);
      line-height: 1.06;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }
    p {
      margin: 0;
      color: var(--muted);
      text-align: center;
      font-size: 16px;
      line-height: 1.45;
    }
    .btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      padding: 14px 16px;
      border-radius: 10px;
      font-weight: 700;
      border: 1px solid var(--btn);
      background: var(--btn);
      color: var(--btnText);
    }
    .btn.secondary { background: #fff; color: #111; }
    .hr { height: 1px; background: var(--line); margin: 4px 0; }

    .foot {
      border-top: 1px solid var(--line);
      padding: 14px 18px 20px;
      color: #7a7a7a;
      font-size: 13px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
    }
    .foot a { color: inherit; }
    @media (max-width: 800px) {
      .links { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="nav">
      <a href="/"><img class="logo" src="https://cdn.prod.website-files.com/654d45c59db76623f5f1a2b8/65568b11f91e8d11ccd581d2_Goodz-logo-Black-5x.png" alt="Goodz"/></a>
      <nav class="links">
        <a href="/about">About</a>
        <a href="/custom">Custom</a>
        <a href="/artist-goodz">Artist</a>
        <a href="/faq">FAQ</a>
        <a href="/support">Support</a>
      </nav>
    </header>

    <main class="wrap">
      <img class="badge" src="https://cdn.prod.website-files.com/654d45c59db76623f5f1a2b8/65820333e2ddb47d9763a62e_squarelogo_black_500px.png" alt="Goodz" />
      <h1>Your Goodz Playlist Link Has Been Successfully Updated</h1>
      <p id="summary">Update this link if you want to change the playlist that this Goodz links to.</p>

      <a id="playlist_link" class="btn" href="#" target="_blank" rel="noopener">Open playlist link</a>
      <div class="hr"></div>
      <a id="change_playlist" class="btn secondary" href="/tapped-edit-url">Change playlist link</a>
    </main>

    <footer class="foot">
      <span>© 2025 Goodz. All rights reserved.</span>
      <a href="/privacy-policy">Privacy Policy</a>
      <a href="/terms-of-service">Terms of Service</a>
    </footer>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search || '');
      var code = params.get('code') || '';
      var playlist = params.get('playlist_url') || '';

      var playlistLink = document.getElementById('playlist_link');
      var changeLink = document.getElementById('change_playlist');
      var summary = document.getElementById('summary');

      if (!playlist) {
        playlistLink.textContent = 'No playlist URL found';
        playlistLink.removeAttribute('href');
        playlistLink.style.opacity = '0.6';
        playlistLink.style.pointerEvents = 'none';
      } else {
        playlistLink.href = playlist;
      }

      var qp = new URLSearchParams();
      if (code) qp.set('code', code);
      if (playlist) qp.set('playlist_url', playlist);
      changeLink.href = '/tapped-edit-url' + (qp.toString() ? ('?' + qp.toString()) : '');

      if (code) summary.textContent = 'You can change this link again any time.';
    })();
  </script>
</body>
</html>
